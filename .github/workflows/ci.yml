name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run scanner tests
        run: cd packages/scanner && bun test

      - name: Test scanner integration
        run: |
          node -e "
            const { scan } = require('./packages/scanner/dist/index');
            const result = scan('.');
            console.log('Score:', result.score, '| Files:', result.meta.filesScanned);
            if (typeof result.score !== 'number') process.exit(1);
          "

      - name: Test CLI loads
        run: node packages/cli/dist/index.js --help

      - name: Test CLI version
        run: node packages/cli/dist/index.js --version
